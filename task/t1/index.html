<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 31 Task</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Heading -->
    <h1>Welcome to My Webpage</h1>

    <!-- Paragraph -->
    <p>This is a simple webpage created as part of my Day 31 task. It includes text, an image, a link, a list, and a form.</p>

    <!-- Image with alt text -->
    <img src="https://via.placeholder.com/300" alt="Sample placeholder image" width="300">

    <!-- Link -->
    <p>Check out my favorite website: 
        <a href="https://www.wikipedia.org" target="_blank">Wikipedia</a>
    </p>

    <!-- Ordered List -->
    <h2>My Top 3 Hobbies</h2>
    <ol>
        <li>Reading Books</li>
        <li>Coding</li>
        <li>Traveling</li>
    </ol>

    <!-- Form -->
    <h2>Contact Me</h2>
    <form action="#" method="post">
        <label for="name">Name:</label><br>
        <input type="text" id="name" name="name" required><br><br>

        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" required><br><br>

        <input type="submit" value="Submit">
        <script src="script.js"></script>
    </form>
</body>
</html>
