<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Simple CSS Selectors & Box Model</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f9f9f9; }

    .container { max-width: 800px; margin: 20px auto; padding: 20px; background: #fff; border: 1px solid #ccc; border-radius: 6px; }

    /* Type selector */
    h1 { color: darkblue; }

    /* Class selector */
    .container { box-shadow: 0 2px 6px rgba(184, 41, 41, 0.1); }

    /* ID selector */
    #intro { background: #e0f7fa; padding: 10px; }

    /* Descendant selector */
    .container p { color: #333; }

    /* Box model examples */
    .box { background: #bbdefb; border: 3px solid #0d47a1; padding: 10px; margin: 10px; }
    .small { padding: 5px; }
    .big { padding: 25px; }
  </style>
</head>
<body>
  <div class="container" id="intro">
    <h1>CSS Selectors & Box Model</h1>
    <p>This page shows simple CSS selectors and how the box model works.</p>
  </div>

  <div class="container">
    <h2>Selectors</h2>
    <p>Type: <code>h1</code></p>
    <p>Class: <code>.container</code></p>
    <p>ID: <code>#intro</code></p>
    <p>Descendant: <code>.container p</code></p>
  </div>

  <div class="container">
    <h2>Box Model</h2>
    <div class="box small">Small padding box</div>
    <div class="box">Normal padding box</div>
    <div class="box big">Big padding box</div>
  </div>
</body>
</html>
