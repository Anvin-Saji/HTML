<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selectors and Box Model</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }

        h1 {
            color: darkblue;
        }

        .highlight {
            color: green;
            font-weight: bold;
        }

        #special {
            background: #ffe4b5;
            padding: 5px;
        }

        .container p {
            color: #444;
        }


        .container {
            max-width: 700px;
            margin: 20px auto;
            padding: 15px;
            border: 1px solid #c31b1b;
        }

        .box {
            background-color: aqua;
            border: 2px solid navy;
            margin: 10px;
            padding: 10px;
        }

        .small {
            padding: 5px;
        }

        .big {
            padding: 25px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>CSS Selectors & Box Model</h1>
        <p class="highlight">This uses a class selector</p>
        <p id="special">This uses an <strong>ID selector</strong>.</p>
        <p>Check this <a href="#">hover link</a> (pseudo-class selector).</p>
    </div>

    <div class="container">
        <h2>Box Model</h2>
        <div class="box small">Small box</div>
        <div class="box">Normal box</div>
        <div class="box big">Big box</div>
    </div>
</body>
</html>
