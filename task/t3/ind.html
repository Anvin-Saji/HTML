<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selectors and Box Model</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        .container {
            max-width: 600px;
            margin: 20px auto;
            padding: 15px;
            border: 1px solid #ccc;
        }

        .box {
            background-color: aqua;
            border: 2px solid navy;
            margin: 10px;
            padding: 10px;
        }

        .small {
            padding: 5px;
        }

        .big {
            padding: 25px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Box Model</h2>
        <div class="box small">Small box</div>
        <div class="box">Normal box</div>
        <div class="box big">Big box</div>
    </div>
</body>
</html>
